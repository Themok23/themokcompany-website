  " fill="url(#mokRibbon)"/>

  <!-- Lower arm edge -->
  <path d="
    M 114 194 L 134 198 L 138 193 L 118 189 Z
  " fill="url(#mokRibbonShadow)" opacity="0.6"/>

  <!-- Lower arm specular highlight -->
  <path d="
    M 53 145 C 65 155, 81 167, 93 175 L 90 178 C 78 170, 62 158, 50 148 Z
  " fill="rgba(255,255,255,0.2)"/>
</svg>
